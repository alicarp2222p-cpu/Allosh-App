<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنتجات المحذوفة - VAG Shop</title>
    <link rel="stylesheet" href="/glass-style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; padding: 20px; transition: 0.3s; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: white; padding: 15px 25px; border-radius: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { height: 55px; width: 55px; object-fit: cover; border-radius: 50%; border: 2px solid #e63946; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .btn-back { background: #2c3e66; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-back:hover { background: #e63946; transform: scale(1.02); }
        .glass-toggle { background: #2c3e66; color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .glass-toggle:hover { background: #e63946; transform: scale(1.05); }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .product-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.08); position: relative; }
        .deleted-badge { position: absolute; top: 10px; left: 10px; background: #e63946; color: white; padding: 5px 12px; border-radius: 30px; font-size: 12px; font-weight: bold; z-index: 1; }
        .image-container { width: 100%; height: 200px; overflow: hidden; background: #f5f5f5; }
        .product-image { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 18px; }
        .product-name { font-size: 18px; font-weight: bold; margin-bottom: 6px; }
        .product-part { font-size: 12px; color: #e63946; margin-bottom: 10px; }
        .product-price { font-size: 22px; font-weight: bold; color: #2c3e66; margin-bottom: 10px; }
        .product-price::before { content: "₪ "; }
        .btn-restore { background: #27ae60; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-restore:hover { background: #2ecc71; transform: scale(1.02); }
        .loading { text-align: center; padding: 50px; font-size: 18px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <img src="/WhatsApp Image 2026-05-11 at 1.33.40 AM.jpeg" alt="Logo" class="logo">
                <h1>🗑️ المنتجات المحذوفة</h1>
            </div>
            <div>
                <a href="/" class="btn-back">🔙 العودة للمنتجات</a>
                <button class="glass-toggle" onclick="toggleGlassMode()">✨ وضع زجاجي</button>
            </div>
        </div>
        <div id="productsContainer" class="products-grid">
            <div class="loading">جاري التحميل...</div>
        </div>
    </div>

    <script>
        function toggleGlassMode() {
            document.body.classList.toggle('glass-mode');
            localStorage.setItem('glassMode', document.body.classList.contains('glass-mode'));
        }
        
        if (localStorage.getItem('glassMode') === 'true') {
            document.body.classList.add('glass-mode');
        }
        
        async function loadDeletedProducts() {
            try {
                const response = await fetch('/api/products/deleted');
                if (!response.ok) throw new Error('فشل التحميل');
                const products = await response.json();
                const container = document.getElementById('productsContainer');

                if (products.length === 0) {
                    container.innerHTML = '<div class="loading">📭 لا توجد منتجات محذوفة</div>';
                    return;
                }

                container.innerHTML = products.map(product => {
                    const img = product.image_url || 'https://via.placeholder.com/300x200?text=No+Image';
                    return `
                        <div class="product-card">
                            <div class="deleted-badge">🗑️ محذوف</div>
                            <div class="image-container">
                                <img class="product-image" src="${img}" alt="${product.name}">
                            </div>
                            <div class="product-info">
                                <div class="product-name">${product.name || 'بدون اسم'}</div>
                                <div class="product-part">#${product.part_number || '---'}</div>
                                <div class="product-price">${product.price || 0}</div>
                                <div class="product-quantity">📦 الكمية السابقة: ${product.quantity || 0}</div>
                                <button class="btn-restore" onclick="restoreProduct(${product.id})">♻️ استعادة المنتج</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error(error);
                document.getElementById('productsContainer').innerHTML = '<div class="loading">❌ خطأ في التحميل</div>';
            }
        }

        async function restoreProduct(id) {
            if (confirm('⚠️ هل تريد استعادة هذا المنتج؟')) {
                try {
                    const response = await fetch(`/api/products/restore/${id}`, { method: 'PUT' });
                    if (response.ok) {
                        alert('✅ تم استعادة المنتج');
                        loadDeletedProducts();
                        if (window.opener) window.opener.location.reload();
                    } else {
                        alert('❌ فشل الاستعادة');
                    }
                } catch (error) {
                    console.error(error);
                    alert('❌ خطأ في الاتصال');
                }
            }
        }

        loadDeletedProducts();
    </script>
</body>
</html>
